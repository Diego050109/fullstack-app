services:
  mongo:
    image: mongo
    container_name: mongo_fullstack
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: backend_fullstack
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend_fullstack
    ports:
      - "3000:3000"
    depends_on:
      - backend